services:
  - type: web
    name: grandhotel
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build && cd .. && python setup_db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
